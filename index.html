<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack A Mole Game</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="game-container">

    <h1>Whack A Mole</h1>

    <div class="info">
        <p>Score: <span id="score">0</span></p>
        <p>Time: <span id="time">60</span></p>
    </div>

    <div class="buttons">
        <button id="start">Start</button>
        <button id="pause">Pause</button>
        <button id="restart">Restart</button>
    </div><br>

    <div class="board">

        <div class="hole" id="hole1">
            <img src="images/mole.png" class="mole" alt="Mole">
        </div>

        <div class="hole" id="hole2">
            <img src="images/mole.png" class="mole" alt="Mole">
        </div>

        <div class="hole" id="hole3">
            <img src="images/mole.png" class="mole" alt="Mole">
        </div>

        <div class="hole" id="hole4">
            <img src="images/mole.png" class="mole" alt="Mole">
        </div>

        <div class="hole" id="hole5">
            <img src="images/mole.png" class="mole" alt="Mole">
        </div>

        <div class="hole" id="hole6">
            <img src="images/mole.png" class="mole" alt="Mole">
        </div>

        <div class="hole" id="hole7">
            <img src="images/mole.png" class="mole" alt="Mole">
        </div>

        <div class="hole" id="hole8">
            <img src="images/mole.png" class="mole" alt="Mole">
        </div>

        <div class="hole" id="hole9">
            <img src="images/mole.png" class="mole" alt="Mole">
        </div>

    </div>

    <h2 id="message"></h2>

</div>

<script src="index.js"></script>

</body>
</body>
</html>
